site_name: Manuale tecnico P3N RT
site_url: https://github.com/ivanrobuschi-custom/P3N_RT.git
site_author: Ivan Robuschi
theme:
  name: material
  logo: assets/icons/logo.png
  favicon: assets/icons/favicon.png
  language: it
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.sections
    - navigation.prune
    - navigation.indexes
    # - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - navigation.footer
# La configurazione della palette qui sovrascrive i colori definiti in extra.css.
# Per usare i colori da extra.css, questa sezione deve essere rimossa o commentata.
#   palette:
#     primary: blue grey

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  
plugins:
  - search
  - tags

copyright: Copyright Custom S.p.A 2026
nav:
- Home: index.md
- MANUALE ASSISTENZA P3-N RT:
  - Introduzione: index2.md
- GENERALITÀ: generalita.md
- MECCANICA: meccanica.md
- ELETTRONICA: elettronica.md
- RICERCA GUASTI: ricerca-guasti.md
- MESSA IN SERVIZIO:
  - PROCEDURE: procedure.md
  - ESPLOSI: esplosi.md
